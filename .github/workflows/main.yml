name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml rich pytest

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Smoke test
        run: |
          python dynamo_waste_monitor.py --simulate --once
